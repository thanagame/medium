# SonarQube config สำหรับ Medium Clone (pnpm monorepo)
# ใช้ร่วมกับ stage 'SonarQube Analysis' ใน Jenkinsfile
sonar.projectKey=test-project
sonar.projectName=test-project
sonar.sourceEncoding=UTF-8

# ขอบเขตซอร์สที่จะสแกน (api + web + shared)
sonar.sources=apps/api/src,apps/web/src,packages/shared/src

# ไฟล์เทส — ไฟล์ที่ match test.inclusions ถูกจัดเป็น "test" ที่เหลือเป็น "source"
sonar.tests=apps/api/src,apps/web/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# ตัดสิ่งที่ไม่ต้องสแกนออก
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,apps/api/prisma/**

# ไฟล์ที่ "สแกนได้" แต่ไม่ควรเอามานับ % coverage (ไม่มี logic ให้เทส)
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.module.ts,**/*.dto.ts,**/dto/**,**/main.ts,**/*.config.ts,apps/web/src/app/**,apps/web/next.config.ts

# TypeScript / coverage (LCOV จาก jest --coverage)
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
