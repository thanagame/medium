services:
  api:
    image: medium-api:${IMAGE_TAG}   # Tag ถูกกำหนดจาก Jenkinsfile ตอนรัน docker compose up (ตรงกับ Image ที่เพิ่ง Build)
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medium
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]   # รอให้ DB/Redis พร้อมก่อนค่อย Start API
    networks: [medium-dev]

  web:
    image: medium-web:${IMAGE_TAG}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000   # URL ที่ฝั่ง Client เรียกกลับมาหา API ผ่าน Kong
    networks: [medium-dev]

kong:
  build:
    context: .
    dockerfile: infra/docker/Dockerfile.kong
  environment:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: /kong/kong.yml
  ports:
    - "8000:8000"
    - "3006:3006"
  depends_on: [api, web]
  networks: [medium-dev]
  
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres   # Dev ใช้รหัสง่ายๆ ได้ ส่วน Prod ต้องดึงจาก Credential (ดู docker-compose.prod.yml)
      POSTGRES_DB: medium
    volumes:
      - medium_dev_pg:/var/lib/postgresql/data   # เก็บข้อมูลถาวรแม้ Container จะถูกลบ/สร้างใหม่
    networks: [medium-dev]

  redis:
    image: redis:7
    networks: [medium-dev]

networks:
  medium-dev:   # แยก Network เฉพาะของ Environment นี้ ไม่ปนกับ staging/prod

volumes:
  medium_dev_pg: