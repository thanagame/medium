services:
  api:
    image: medium-api:${IMAGE_TAG}
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/medium
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, redis]
    networks: [medium-dev]

  web:
    image: medium-web:${IMAGE_TAG}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    networks: [medium-dev]

  kong:
    build:
      context: .
      dockerfile: infra/kong/Dockerfile.kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
    ports:
      - "8000:8000"
      - "3006:3006"
    depends_on: [api, web]
    networks: [medium-dev]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medium
    volumes:
      - medium_dev_pg:/var/lib/postgresql/data
    networks: [medium-dev]

  redis:
    image: redis:7
    networks: [medium-dev]

networks:
  medium-dev:

volumes:
  medium_dev_pg: